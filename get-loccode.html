<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maiaddy — Get Your Loccode</title>
    <script>
      (function () {
        const PLAY_STORE_URL =
          "https://play.google.com/store/apps/details?id=com.maiaddy.app";
        const APP_STORE_URL =
          "https://apps.apple.com/ng/app/maiaddy-get-your-loccode/id6737343500";
        const ua = navigator.userAgent || navigator.vendor || window.opera || "";
        const isIOS =
          /iPad|iPhone|iPod/.test(ua) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        const targetUrl = isIOS ? APP_STORE_URL : PLAY_STORE_URL;
        window.location.replace(targetUrl);
      })();
    </script>
    <meta
      http-equiv="refresh"
      content="0;url=https://play.google.com/store/apps/details?id=com.maiaddy.app"
    />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #f5f8fe;
        color: #0b1220;
        text-align: center;
      }
      a {
        color: #4c4cfa;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div>
      <h2>Redirecting to App Store...</h2>
      <p>
        If you are not redirected automatically,
        <a id="fallback-link" href="https://play.google.com/store/apps/details?id=com.maiaddy.app"
          >click here to download Maiaddy</a
        >.
      </p>
    </div>
    <script>
      (function () {
        const ua = navigator.userAgent || navigator.vendor || window.opera || "";
        const isIOS =
          /iPad|iPhone|iPod/.test(ua) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        const link = document.getElementById("fallback-link");
        if (link && isIOS) {
          link.href =
            "https://apps.apple.com/ng/app/maiaddy-get-your-loccode/id6737343500";
        }
      })();
    </script>
  </body>
</html>
